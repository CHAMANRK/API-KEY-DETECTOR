<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Key Detective</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --surface: #0d1117;
    --border: #1e2733;
    --border-glow: #2a3a4a;
    --text: #c9d4e0;
    --muted: #4a5a6a;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --warn: #ff6b35;
    --danger: #ff3b5c;
    --success: #00d4aa;
    --openai: #10a37f;
    --groq: #f55036;
    --anthropic: #d97757;
    --gemini: #4285f4;
    --openrouter: #6c47ff;
    --nvidia: #76b900;
    --mistral: #ff7000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: orb-drift 12s ease-in-out infinite alternate;
  }

  @keyframes orb-drift {
    from { transform: translate(0, 0); }
    to { transform: translate(200px, 100px); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fade-up 0.6s ease both;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(0,212,170,0.3);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  /* Service badges */
  .services-strip {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 36px;
    animation: fade-up 0.6s 0.1s ease both;
  }

  .badge {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    border: 1px solid;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .badge:hover { opacity: 1; }
  .badge.openai { color: var(--openai); border-color: var(--openai); }
  .badge.groq { color: var(--groq); border-color: var(--groq); }
  .badge.anthropic { color: var(--anthropic); border-color: var(--anthropic); }
  .badge.gemini { color: var(--gemini); border-color: var(--gemini); }
  .badge.openrouter { color: var(--openrouter); border-color: var(--openrouter); }
  .badge.nvidia { color: var(--nvidia); border-color: var(--nvidia); }
  .badge.mistral { color: var(--mistral); border-color: var(--mistral); }

  /* Input card */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
    animation: fade-up 0.6s 0.2s ease both;
    position: relative;
    overflow: hidden;
  }

  .input-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .input-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .key-input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .key-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 48px 14px 16px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }

  .key-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
  }

  .key-input::placeholder { color: var(--muted); }

  .toggle-vis {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }
  .toggle-vis:hover { color: var(--accent); }

  /* Detected service indicator */
  .detected-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    min-height: 28px;
  }

  .detected-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .detected-chip {
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid currentColor;
    animation: pop-in 0.3s ease;
    display: none;
  }

  @keyframes pop-in {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* Hint select */
  .hint-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .hint-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .hint-select {
    flex: 1;
    min-width: 160px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .hint-select:focus { border-color: var(--accent); }
  .hint-select option { background: var(--surface); }

  /* Check button */
  .check-btn {
    width: 100%;
    margin-top: 20px;
    padding: 14px 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    position: relative;
    overflow: hidden;
  }

  .check-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,212,170,0.3);
  }

  .check-btn:active { transform: translateY(0); }
  .check-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
  }

  .check-btn:hover .btn-shimmer {
    animation: shimmer 0.6s ease;
  }

  @keyframes shimmer {
    to { transform: translateX(100%); }
  }

  /* Scanning animation */
  .scanning-bar {
    display: none;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
    margin-top: 12px;
    animation: scan 1.2s ease-in-out infinite;
  }

  @keyframes scan {
    0% { transform: translateX(-100%) scaleX(0.3); }
    50% { transform: translateX(0%) scaleX(1); }
    100% { transform: translateX(100%) scaleX(0.3); }
  }

  /* Results area */
  #results { animation: fade-up 0.4s ease both; }

  .section-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 16px;
    animation: fade-up 0.4s ease both;
  }

  .result-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .service-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .service-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }

  .status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .status-valid {
    background: rgba(0,212,170,0.15);
    color: var(--success);
    border: 1px solid rgba(0,212,170,0.3);
  }

  .status-invalid {
    background: rgba(255,59,92,0.12);
    color: var(--danger);
    border: 1px solid rgba(255,59,92,0.3);
  }

  .status-checking {
    background: rgba(0,153,255,0.12);
    color: var(--accent2);
    border: 1px solid rgba(0,153,255,0.3);
  }

  .status-proxy {
    background: rgba(255,107,53,0.12);
    color: var(--warn);
    border: 1px solid rgba(255,107,53,0.3);
  }

  .result-body {
    padding: 16px 20px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .info-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .info-key {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .info-val {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
    word-break: break-all;
  }

  .info-val.green { color: var(--success); }
  .info-val.red { color: var(--danger); }
  .info-val.blue { color: var(--accent2); }
  .info-val.orange { color: var(--warn); }

  /* Models list */
  .models-section { margin-top: 12px; }

  .models-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .models-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 120px;
    overflow-y: auto;
  }

  .models-wrap::-webkit-scrollbar { width: 4px; }
  .models-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .models-wrap::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 2px; }

  .model-tag {
    padding: 3px 9px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: var(--muted);
    transition: all 0.15s;
  }

  .model-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Copy key row */
  .copy-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .key-masked {
    flex: 1;
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
  }

  .copy-btn {
    padding: 6px 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: var(--success);
    color: var(--success);
  }

  /* Error message */
  .error-msg {
    font-size: 12px;
    color: var(--danger);
    padding: 8px 0;
  }

  .proxy-note {
    font-size: 12px;
    color: var(--warn);
    padding: 10px 14px;
    background: rgba(255,107,53,0.08);
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 8px;
    margin-top: 8px;
    line-height: 1.6;
  }

  /* Animations */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Pulse dot */
  .pulse-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
    margin-right: 6px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .info-grid { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo-line">
      <div class="logo-icon">🔑</div>
      <h1>API Key Detective</h1>
    </div>
    <p class="subtitle">// paste any AI api key → we identify + validate everything</p>
  </header>

  <div class="services-strip">
    <span class="badge openai">OpenAI</span>
    <span class="badge groq">Groq</span>
    <span class="badge anthropic">Anthropic</span>
    <span class="badge gemini">Gemini</span>
    <span class="badge openrouter">OpenRouter</span>
    <span class="badge nvidia">NVIDIA</span>
    <span class="badge mistral">Mistral</span>
  </div>

  <div class="input-card">
    <div class="input-label">// paste your api key</div>

    <div class="key-input-wrap">
      <input
        type="password"
        id="apiKeyInput"
        class="key-input"
        placeholder="sk-... / gsk_... / AIza... / nvapi-... / sk-ant-..."
        autocomplete="off"
        spellcheck="false"
      >
      <button class="toggle-vis" id="toggleVis" title="Show/Hide">👁</button>
    </div>

    <div class="detected-wrap">
      <span class="detected-label">detected:</span>
      <span class="detected-chip" id="detectedChip">—</span>
      <span id="noDetect" style="font-size:12px;color:var(--muted);">type a key to auto-detect</span>
    </div>

    <div class="hint-row">
      <span class="hint-label">hint (optional):</span>
      <select class="hint-select" id="hintSelect">
        <option value="">— let me auto-detect —</option>
        <option value="openai">OpenAI</option>
        <option value="groq">Groq</option>
        <option value="anthropic">Anthropic</option>
        <option value="gemini">Google Gemini</option>
        <option value="openrouter">OpenRouter</option>
        <option value="nvidia">NVIDIA NIM</option>
        <option value="mistral">Mistral AI</option>
      </select>
    </div>

    <button class="check-btn" id="checkBtn" onclick="runCheck()">
      <span class="btn-shimmer"></span>
      🔍 &nbsp;Identify + Validate Key
    </button>

    <div class="scanning-bar" id="scanBar"></div>
  </div>

  <div id="results"></div>

</div>

<script>
// ─── Service Detection Patterns ───────────────────────────────────────
const SERVICE_PATTERNS = [
  { id: 'openai',     name: 'OpenAI',       color: '#10a37f', pattern: /^sk-[A-Za-z0-9]{20,}/ },
  { id: 'groq',       name: 'Groq',         color: '#f55036', pattern: /^gsk_[A-Za-z0-9]{20,}/ },
  { id: 'anthropic',  name: 'Anthropic',    color: '#d97757', pattern: /^sk-ant-[A-Za-z0-9\-]{20,}/ },
  { id: 'gemini',     name: 'Google Gemini',color: '#4285f4', pattern: /^AIza[A-Za-z0-9\-_]{30,}/ },
  { id: 'openrouter', name: 'OpenRouter',   color: '#6c47ff', pattern: /^sk-or-[A-Za-z0-9\-]{20,}/ },
  { id: 'nvidia',     name: 'NVIDIA NIM',   color: '#76b900', pattern: /^nvapi-[A-Za-z0-9\-_]{20,}/ },
  { id: 'mistral',    name: 'Mistral AI',   color: '#ff7000', pattern: /^[A-Za-z0-9]{32}$/ },
];

let currentKey = '';

// ─── Auto-detect on input ─────────────────────────────────────────────
document.getElementById('apiKeyInput').addEventListener('input', function() {
  currentKey = this.value.trim();
  const detected = detectService(currentKey);
  updateDetectedUI(detected);
});

document.getElementById('toggleVis').addEventListener('click', function() {
  const inp = document.getElementById('apiKeyInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁' : '🙈';
});

function detectService(key) {
  if (!key || key.length < 8) return null;
  const hint = document.getElementById('hintSelect').value;
  if (hint) return SERVICE_PATTERNS.find(s => s.id === hint) || null;
  for (const svc of SERVICE_PATTERNS) {
    if (svc.pattern.test(key)) return svc;
  }
  return null;
}

function updateDetectedUI(svc) {
  const chip = document.getElementById('detectedChip');
  const noDetect = document.getElementById('noDetect');
  if (svc) {
    chip.style.display = 'inline-block';
    chip.style.color = svc.color;
    chip.style.borderColor = svc.color;
    chip.textContent = svc.name;
    noDetect.style.display = 'none';
  } else {
    chip.style.display = 'none';
    noDetect.style.display = 'inline';
    noDetect.textContent = currentKey.length > 3 ? '⚠ unknown pattern' : 'type a key to auto-detect';
  }
}

// ─── Main check function ──────────────────────────────────────────────
async function runCheck() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { alert('Please paste an API key first!'); return; }

  const detected = detectService(key);
  const btn = document.getElementById('checkBtn');
  const scanBar = document.getElementById('scanBar');
  const results = document.getElementById('results');

  btn.disabled = true;
  btn.innerHTML = '<span class="pulse-dot"></span> Scanning...';
  scanBar.style.display = 'block';
  results.innerHTML = '';

  // Determine which services to check
  let servicesToCheck = [];
  if (detected) {
    servicesToCheck = [detected];
  } else {
    // Try all
    servicesToCheck = SERVICE_PATTERNS;
  }

  let html = `<div class="section-title">// scan results</div>`;

  for (const svc of servicesToCheck) {
    html += buildLoadingCard(svc);
  }
  results.innerHTML = html;

  // Now fetch each
  for (const svc of servicesToCheck) {
    const cardEl = document.getElementById(`card-${svc.id}`);
    const result = await checkService(svc.id, key);
    if (cardEl) cardEl.outerHTML = buildResultCard(svc, key, result);
  }

  btn.disabled = false;
  btn.innerHTML = '🔍 &nbsp;Identify + Validate Key';
  scanBar.style.display = 'none';
}

// ─── Build loading card ───────────────────────────────────────────────
function buildLoadingCard(svc) {
  return `
  <div class="result-card" id="card-${svc.id}">
    <div class="result-header">
      <div class="service-dot" style="background:${svc.color}"></div>
      <span class="service-name" style="color:${svc.color}">${svc.name}</span>
      <span class="status-badge status-checking"><span class="pulse-dot" style="margin-right:4px;background:var(--accent2)"></span>checking...</span>
    </div>
  </div>`;
}

// ─── Build result card ────────────────────────────────────────────────
function buildResultCard(svc, key, result) {
  const maskedKey = key.slice(0, 8) + '••••••••••••' + key.slice(-4);
  const statusClass = result.valid === true ? 'status-valid' : result.valid === 'proxy' ? 'status-proxy' : 'status-invalid';
  const statusText = result.valid === true ? '✓ VALID' : result.valid === 'proxy' ? '⚡ PROXY NEEDED' : '✗ INVALID';

  let infoGrid = '';
  if (result.info) {
    for (const [k, v] of Object.entries(result.info)) {
      infoGrid += `
      <div class="info-item">
        <div class="info-key">${k}</div>
        <div class="info-val ${v.cls || ''}">${v.val}</div>
      </div>`;
    }
  }

  let modelsHtml = '';
  if (result.models && result.models.length > 0) {
    const tags = result.models.slice(0, 40).map(m => `<span class="model-tag">${m}</span>`).join('');
    const more = result.models.length > 40 ? `<span class="model-tag" style="color:var(--accent)">+${result.models.length - 40} more</span>` : '';
    modelsHtml = `
    <div class="models-section">
      <div class="models-label">available models (${result.models.length})</div>
      <div class="models-wrap">${tags}${more}</div>
    </div>`;
  }

  let proxyNote = '';
  if (result.valid === 'proxy') {
    proxyNote = `<div class="proxy-note">⚡ This service blocks direct browser requests (CORS). Deploy with Vercel proxy to validate. See <code>api/check-${svc.id}.js</code></div>`;
  }

  let errorMsg = '';
  if (result.error) {
    errorMsg = `<div class="error-msg">⚠ ${result.error}</div>`;
  }

  return `
  <div class="result-card">
    <div class="result-header">
      <div class="service-dot" style="background:${svc.color}"></div>
      <span class="service-name" style="color:${svc.color}">${svc.name}</span>
      <span class="status-badge ${statusClass}">${statusText}</span>
    </div>
    <div class="result-body">
      ${infoGrid ? `<div class="info-grid">${infoGrid}</div>` : ''}
      ${modelsHtml}
      ${proxyNote}
      ${errorMsg}
      <div class="copy-row">
        <span class="key-masked">${maskedKey}</span>
        <button class="copy-btn" onclick="copyKey('${key}', this)">📋 Copy Key</button>
      </div>
    </div>
  </div>`;
}

// ─── Service checkers ─────────────────────────────────────────────────
async function checkService(id, key) {
  try {
    switch(id) {
      case 'openai':     return await checkOpenAI(key);
      case 'groq':       return await checkGroq(key);
      case 'anthropic':  return await checkAnthropic(key);
      case 'gemini':     return await checkGemini(key);
      case 'openrouter': return await checkOpenRouter(key);
      case 'nvidia':     return await checkNvidia(key);
      case 'mistral':    return await checkMistral(key);
      default:           return { valid: false, error: 'Unknown service' };
    }
  } catch(e) {
    return { valid: false, error: e.message };
  }
}

// OpenAI
async function checkOpenAI(key) {
  const r = await fetch('https://api.openai.com/v1/models', {
    headers: { 'Authorization': `Bearer ${key}` }
  });
  if (r.status === 401) return { valid: false, error: 'Invalid API key' };
  if (!r.ok) return { valid: false, error: `HTTP ${r.status}` };
  const data = await r.json();
  const models = (data.data || []).map(m => m.id).sort();
  const rateLimit = r.headers.get('x-ratelimit-limit-requests') || '—';
  return {
    valid: true,
    info: {
      'service': { val: 'OpenAI', cls: '' },
      'models count': { val: models.length, cls: 'green' },
      'rate limit': { val: rateLimit },
      'key prefix': { val: key.slice(0, 7) + '...', cls: 'blue' },
    },
    models
  };
}

  };
}

// OpenRouter
async function checkOpenRouter(key) {
  const [modelsRes, creditsRes] = await Promise.allSettled([
    fetch('https://openrouter.ai/api/v1/models', {
      headers: { 'Authorization': `Bearer ${key}` }
    }),
    fetch('https://openrouter.ai/api/v1/auth/key', {
      headers: { 'Authorization': `Bearer ${key}` }
    })
  ]);
  
  if (modelsRes.status === 'fulfilled' && modelsRes.value.status === 401)
    return { valid: false, error: 'Invalid API key' };

  let models = [];
  if (modelsRes.status === 'fulfilled' && modelsRes.value.ok) {
    const d = await modelsRes.value.json();
    models = (d.data || []).map(m => m.id).sort();
  }

  let credits = '—';
  if (creditsRes.status === 'fulfilled' && creditsRes.value.ok) {
    const d = await creditsRes.value.json();
    credits = d.data?.limit_remaining !== undefined
      ? `$${parseFloat(d.data.limit_remaining).toFixed(4)}`
      : '—';
  }

  return {
    valid: true,
    info: {
      'service': { val: 'OpenRouter', cls: '' },
      'models count': { val: models.length, cls: 'green' },
      'credits left': { val: credits, cls: credits !== '—' ? 'green' : '' },
      'key prefix': { val: key.slice(0, 8) + '...', cls: 'blue' },
    },
    models
  };
}

// ─── Copy util ────────────────────────────────────────────────────────
function copyKey(key, btn) {
  navigator.clipboard.writeText(key).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copy Key';
      btn.classList.remove('copied');
    }, 2000);
  });
}
